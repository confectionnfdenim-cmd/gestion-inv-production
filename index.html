<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Inventaire N&F</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <button data-tab="dashboard">Dashboard</button>
    <button data-tab="tissu">Tissu</button>
    <button data-tab="patch">Patch</button>
    <button data-tab="flasher">Flasher</button>
    <button data-tab="bouton">Bouton</button>
    <button data-tab="rivet">Rivet</button>
    <button data-tab="etiquette">Étiquette</button>
    <button data-tab="projets">Projets</button>
    <button data-tab="modeles">Modèles</button>
    <button data-tab="mouvements">Mouvements</button>
</nav>

<div id="content">

    <!-- DASHBOARD -->
    <section id="dashboard" class="tab">
        <h2>Tableau de bord</h2>
        <div id="dashboard-content" class="card-container"></div>
    </section>

    <!-- TISSU -->
    <section id="tissu" class="tab">
        <h2>Tissu</h2>
        <button class="add-btn" onclick="openAddForm('tissu')">+ Ajouter un article</button>

        <div class="filters">
            <select id="filter-actif-tissu" onchange="applyFilters('tissu')">
                <option value="all">Tous</option>
                <option value="active">Actifs</option>
                <option value="inactive">Inactifs</option>
            </select>

            <select id="filter-stock-tissu" onchange="applyFilters('tissu')">
                <option value="all">Stock normal</option>
                <option value="low">Stock bas</option>
            </select>

            <input type="text" id="filter-search-tissu" placeholder="Recherche code..." oninput="applyFilters('tissu')">
        </div>

        <div class="card-container" id="cards-tissu"></div>
    </section>

    <!-- PATCH -->
    <section id="patch" class="tab">
        <h2>Patch</h2>
        <button class="add-btn" onclick="openAddForm('patch')">+ Ajouter un article</button>

        <div class="filters">
            <select id="filter-actif-patch" onchange="applyFilters('patch')">
                <option value="all">Tous</option>
                <option value="active">Actifs</option>
                <option value="inactive">Inactifs</option>
            </select>

            <select id="filter-stock-patch" onchange="applyFilters('patch')">
                <option value="all">Stock normal</option>
                <option value="low">Stock bas</option>
            </select>

            <input type="text" id="filter-search-patch" placeholder="Recherche code..." oninput="applyFilters('patch')">
        </div>

        <div class="card-container" id="cards-patch"></div>
    </section>

    <!-- FLASHER -->
    <section id="flasher" class="tab">
        <h2>Flasher</h2>
        <button class="add-btn" onclick="openAddForm('flasher')">+ Ajouter un article</button>

        <div class="filters">
            <select id="filter-actif-flasher" onchange="applyFilters('flasher')">
                <option value="all">Tous</option>
                <option value="active">Actifs</option>
                <option value="inactive">Inactifs</option>
            </select>

            <select id="filter-stock-flasher" onchange="applyFilters('flasher')">
                <option value="all">Stock normal</option>
                <option value="low">Stock bas</option>
            </select>

            <input type="text" id="filter-search-flasher" placeholder="Recherche code..." oninput="applyFilters('flasher')">
        </div>

        <div class="card-container" id="cards-flasher"></div>
    </section>

    <!-- BOUTON -->
    <section id="bouton" class="tab">
        <h2>Bouton</h2>
        <button class="add-btn" onclick="openAddForm('bouton')">+ Ajouter un article</button>

        <div class="filters">
            <select id="filter-actif-bouton" onchange="applyFilters('bouton')">
                <option value="all">Tous</option>
                <option value="active">Actifs</option>
                <option value="inactive">Inactifs</option>
            </select>

            <select id="filter-stock-bouton" onchange="applyFilters('bouton')">
                <option value="all">Stock normal</option>
                <option value="low">Stock bas</option>
            </select>

            <input type="text" id="filter-search-bouton" placeholder="Recherche code..." oninput="applyFilters('bouton')">
        </div>

        <div class="card-container" id="cards-bouton"></div>
    </section>

    <!-- RIVET -->
    <section id="rivet" class="tab">
        <h2>Rivet</h2>
        <button class="add-btn" onclick="openAddForm('rivet')">+ Ajouter un article</button>

        <div class="filters">
            <select id="filter-actif-rivet" onchange="applyFilters('rivet')">
                <option value="all">Tous</option>
                <option value="active">Actifs</option>
                <option value="inactive">Inactifs</option>
            </select>

            <select id="filter-stock-rivet" onchange="applyFilters('rivet')">
                <option value="all">Stock normal</option>
                <option value="low">Stock bas</option>
            </select>

            <input type="text" id="filter-search-rivet" placeholder="Recherche code..." oninput="applyFilters('rivet')">
        </div>

        <div class="card-container" id="cards-rivet"></div>
    </section>

    <!-- ÉTIQUETTE -->
    <section id="etiquette" class="tab">
        <h2>Étiquette</h2>
        <button class="add-btn" onclick="openAddForm('etiquette')">+ Ajouter un article</button>

        <div class="filters">
            <select id="filter-actif-etiquette" onchange="applyFilters('etiquette')">
                <option value="all">Tous</option>
                <option value="active">Actifs</option>
                <option value="inactive">Inactifs</option>
            </select>

            <select id="filter-stock-etiquette" onchange="applyFilters('etiquette')">
                <option value="all">Stock normal</option>
                <option value="low">Stock bas</option>
            </select>

            <input type="text" id="filter-search-etiquette" placeholder="Recherche code..." oninput="applyFilters('etiquette')">
        </div>

        <div class="card-container" id="cards-etiquette"></div>
    </section>

    <!-- PROJETS -->
    <section id="projets" class="tab">
        <h2>Projets</h2>
        <button class="add-btn" onclick="openProjectForm()">+ Nouveau projet</button>
        <div id="project-list"></div>
    </section>

    <!-- MODÈLES -->
    <section id="modeles" class="tab">
        <h2>Modèles</h2>
        <button class="add-btn" onclick="addModele()">+ Ajouter un modèle</button>
        <div id="modeles-list"></div>
    </section>

    <!-- MOUVEMENTS -->
    <section id="mouvements" class="tab">
        <h2>Mouvements d’inventaire</h2>
        <div id="mouvements-list" class="card-container"></div>
    </section>

</div>

<!-- POPUPS (contenu généré en JS) -->
<div id="addForm" class="modal"></div>
<div id="editForm" class="modal"></div>
<div id="projectForm" class="modal"></div>

<script src="script.js"></script>
</body>
</html>
<script src="script.js"></script>
